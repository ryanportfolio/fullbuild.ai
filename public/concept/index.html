<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Design directions for fullbuild.ai that are still being decided.">
  <meta name="theme-color" content="#17151f">
  <title>fullbuild.ai · concepts</title>
  <link rel="icon" href="/prototype/build-seam/assets/favicon.svg" type="image/svg+xml">
  <style>
    @font-face {
      font-family: "Anybody Local";
      src: url("/prototype/build-seam/assets/fonts/Anybody[wdth,wght].ttf") format("truetype-variations");
      font-style: normal;
      font-weight: 100 900;
      font-stretch: 50% 150%;
      font-display: swap;
    }

    :root {
      --ink: #17151f;
      --milk: #f3f0e8;
      --lemon: #e9ff65;
      --coral: #ff6b58;
      --orchid: #a987ff;
      --gutter: clamp(1.1rem, 3.2vw, 3.5rem);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100svh;
      margin: 0;
      background: var(--ink);
      color: var(--milk);
      font-family: "Anybody Local", Arial, sans-serif;
      line-height: 1.45;
    }

    ::selection { background: var(--coral); color: var(--ink); }

    header {
      display: flex;
      height: 4.25rem;
      padding: 0 var(--gutter);
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--milk);
      font-size: 0.76rem;
      font-variation-settings: "wdth" 82, "wght" 710;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    header a { color: inherit; text-decoration: none; }

    header nav { display: flex; gap: clamp(1rem, 3vw, 2.2rem); }

    .wordmark { font-variation-settings: "wdth" 135, "wght" 800; text-transform: lowercase; }

    main { padding: clamp(3rem, 7vw, 6rem) var(--gutter) clamp(4rem, 8vw, 7rem); }

    .kicker {
      margin: 0;
      font-size: 0.76rem;
      font-variation-settings: "wdth" 90, "wght" 780;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--coral);
    }

    h1 {
      margin: 1.2rem 0 0;
      font-size: clamp(3.6rem, 10vw, 9rem);
      font-variation-settings: "wdth" 74, "wght" 820;
      letter-spacing: -0.02em;
      line-height: 0.9;
    }

    .lede {
      max-width: 34ch;
      margin: 1.6rem 0 0;
      font-size: clamp(1rem, 0.95rem + 0.4vw, 1.3rem);
      font-variation-settings: "wdth" 100, "wght" 540;
    }

    ol {
      max-width: 62rem;
      margin: clamp(3rem, 6vw, 5rem) 0 0;
      padding: 0;
      border-top: 2px solid var(--milk);
      list-style: none;
    }

    li { border-bottom: 1px solid var(--milk); }

    .row {
      display: grid;
      padding: 1.6rem 0;
      grid-template-columns: 4.5rem 1fr auto;
      gap: 1.2rem;
      align-items: baseline;
    }

    a.row { color: inherit; text-decoration: none; }

    a.row:hover h2, a.row:focus-visible h2 { color: var(--coral); }

    a.row:focus-visible { outline: 3px solid var(--coral); outline-offset: 5px; }

    .row .num {
      font-size: 0.9rem;
      font-variation-settings: "wdth" 100, "wght" 400;
    }

    .row h2 {
      margin: 0;
      font-size: clamp(1.7rem, 4vw, 3.2rem);
      font-variation-settings: "wdth" 92, "wght" 780;
      letter-spacing: -0.02em;
      line-height: 0.95;
    }

    .row p {
      margin: 0.5rem 0 0;
      font-size: 0.95rem;
      opacity: 0.75;
    }

    .tag {
      padding: 0.35rem 0.6rem;
      border: 2px solid currentColor;
      font-size: 0.68rem;
      font-variation-settings: "wdth" 90, "wght" 780;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .tag--live { background: var(--coral); border-color: var(--coral); color: var(--ink); }

    .note {
      max-width: 40ch;
      margin: clamp(2.5rem, 5vw, 4rem) 0 0;
      font-size: 0.85rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <header>
    <a class="wordmark" href="/">fullbuild.ai</a>
    <nav>
      <a href="/prototype">prototypes</a>
      <a href="/">live site →</a>
    </nav>
  </header>
  <main>
    <p class="kicker">Design directions</p>
    <h1>Concepts</h1>
    <p class="lede">Directions still being decided. Prototypes come from here.</p>
    <ol>
      <li>
        <a class="row" href="/concept/time-lapse-manufacture">
          <span class="num">01</span>
          <span>
            <h2>Time-Lapse Manufacture</h2>
            <p>Scroll as build time. One artifact, four states.</p>
          </span>
          <span class="tag tag--live">view</span>
        </a>
      </li>
    </ol>
    <p class="note">Everything here is still open to change. One of these becomes the site.</p>
  </main>
</body>
</html>
